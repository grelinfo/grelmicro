services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: demo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo"]
      interval: 2s
      timeout: 3s
      retries: 15

  app:
    build:
      # Repo root, so the demo runs against this checkout of grelmicro.
      context: ../..
      dockerfile: examples/fastapi-demo/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_URL: postgresql://demo:demo@postgres:5432/demo
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://localhost:8000/livez').status == 200 else 1)"
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s
