site_name: grelmicro
site_description: grelmicro is a lightweight toolkit for building Python applications that need to coordinate work across processes, workers, or services.
site_url: https://grelinfo.github.io/grelmicro
theme:
  name: material
  logo: img/logo/favicon-48.png
  favicon: img/logo/favicon-192.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - content.tabs.link
    - content.code.copy
    - content.code.select
    - content.tooltips
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.top
    - navigation.tracking

repo_name: grelinfo/grelmicro
repo_url: https://github.com/grelinfo/grelmicro

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/grelinfo/grelmicro
      name: grelmicro on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/grelmicro/
      name: grelmicro on PyPI

exclude_docs: |
  img/logo/README.md
  img/logo/build_logo.py

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn

nav:
- grelmicro: index.md
- installation.md
- User Guide:
    - first-steps.md
    - wiring.md
    - cache.md
    - idempotency.md
    - coordination.md
    - task.md
    - Resilience:
        - resilience/index.md
        - resilience/shield.md
        - resilience/bulkhead.md
        - resilience/circuit-breaker.md
        - resilience/fallback.md
        - resilience/rate-limiter.md
        - resilience/retry.md
        - resilience/timeout.md
        - resilience/composition.md
    - health.md
    - logging.md
    - tracing.md
    - metrics.md
    - config.md
    - testing.md
- Advanced User Guide:
    - advanced/config.md
    - configuration/reconfigure-from-configmap.md
    - providers.md
    - capabilities.md
    - comparison.md
    - benchmarks.md
- API Reference:
    - reference/cache.md
    - reference/clock.md
    - reference/config.md
    - reference/fastapi.md
    - reference/health.md
    - reference/idempotency.md
    - reference/logging.md
    - reference/metrics.md
    - reference/resilience.md
    - reference/coordination.md
    - reference/task.md
    - reference/testing.md
    - reference/trace.md
- Architecture:
    - architecture/index.md
    - architecture/asyncio.md
    - architecture/backends.md
    - architecture/config.md
    - architecture/reconfigure.md
    - architecture/imports.md
    - architecture/plugins.md
    - architecture/multiple-apps.md
    - architecture/decorators.md
    - architecture/sync-from-thread.md
    - architecture/coordination.md
    - architecture/graceful-shutdown.md
    - architecture/kubernetes.md
    - architecture/sqlite.md
    - architecture/tracing.md
    - architecture/testing.md
- roadmap.md
- changelog.md
- Third-party notices: third_party_notices.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            extensions:
              - griffe_typingdoc
            docstring_style: google
            docstring_section_style: spacy
            show_source: false
            show_root_heading: true
            show_if_no_docstring: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            merge_init_into_class: true
            show_signature_annotations: true
            separate_signature: true
            signature_crossrefs: true
            unwrap_annotated: true
            filters:
              - '!^_'

extra_css:
  - css/overrides.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: docs/snippets
      check_paths: true
