name: Release
on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: 'The version to manually release'
        required: true
      dry_run:
        type: boolean
        description: 'Dry run the release process'
        default: false
permissions: {}
jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    environment: pypi
    env:
      UV_FROZEN: 1
      RELEASE_VERSION: ${{ github.event.release.tag_name || github.event.inputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          ref: ${{ env.RELEASE_VERSION }}
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.1.0
        with:
          enable-cache: false
      - name: Set Package Version
        run: uv version -- "$RELEASE_VERSION"
      - name: Build Package
        run: uv build
      - name: Verify Wheel Installs
        run: uv run --no-project -- pip install dist/*.whl
      - name: Publish Package to PyPI
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true
  publish-docs:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    env:
      UV_FROZEN: 1
      RELEASE_VERSION: ${{ github.event.release.tag_name || github.event.inputs.version }}
      GH_ACTOR: ${{ github.actor }}
      GH_ACTOR_ID: ${{ github.actor_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          ref: ${{ env.RELEASE_VERSION }}
          fetch-depth: 0
          persist-credentials: true
      - name: Configure Git User
        run: |
          git config user.name "$GH_ACTOR"
          git config user.email "${GH_ACTOR_ID}+${GH_ACTOR}@users.noreply.github.com"
      - name: Install uv and Activate Environment
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.1.0
        with:
          enable-cache: true
          activate-environment: true
      - name: Install Docs Dependencies
        run: uv sync --group docs
      - name: Build Docs
        run: mkdocs build
      - name: Deploy Docs on GitHub Pages
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: mkdocs gh-deploy --force
