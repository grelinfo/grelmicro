name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Nightly full run: matrix, slow, integration, and demo tiers.
    - cron: "0 3 * * *"
  workflow_dispatch: {}
permissions: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
    UV_FROZEN: 1
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          activate-environment: true
      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run Ty
        run: uv run ty check

  docs:
    name: Docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          activate-environment: true
      - name: Install dependencies
        run: uv sync --group docs
      - name: Build docs (strict)
        # --strict fails on broken links and missing nav; check_paths in
        # mkdocs.yml fails on missing snippet includes. Together they catch
        # doc and snippet drift that the snippet-execution tests cannot see.
        run: uv run mkdocs build --strict

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6

  tests:
    name: Tests
    # PRs and pushes to main run the light tier (unit, Python 3.12). The
    # nightly schedule and manual dispatch run the full tier (matrix, slow,
    # integration, demo). Release runs the full tier before publishing.
    uses: ./.github/workflows/reusable-tests.yml
    with:
      full: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
