name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Nightly full run: matrix, slow, integration, and demo tiers.
    - cron: "0 3 * * *"
  workflow_dispatch: {}
permissions: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
    UV_FROZEN: 1
jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          # A workflow change re-runs every tier. Code includes the snippet
          # and README tests, which live under tests/ and run in the test job.
          filters: |
            code:
              - 'grelmicro/**'
              - 'tests/**'
              - 'examples/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.python-version'
              - '.github/workflows/**'
            docs:
              - 'docs/**'
              - 'mkdocs.yml'
              - 'README.md'
              - '.github/workflows/**'
            workflows:
              - '.github/workflows/**'

  lint:
    name: Lint
    needs: changes
    # Path filtering applies to pull requests only. Pushes, the nightly
    # schedule, and manual dispatch always run, so a mis-filtered PR is still
    # covered once it lands on main.
    if: ${{ needs.changes.outputs.code == 'true' || github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          activate-environment: true
      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run Ty
        run: uv run ty check

  docs:
    name: Docs
    needs: changes
    if: ${{ needs.changes.outputs.docs == 'true' || github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          activate-environment: true
      - name: Install dependencies
        run: uv sync --group docs
      - name: Build docs (strict)
        # --strict fails on broken links and missing nav; check_paths in
        # mkdocs.yml fails on missing snippet includes. Together they catch
        # doc and snippet drift that the snippet-execution tests cannot see.
        run: uv run mkdocs build --strict

  workflow-lint:
    name: Workflow Lint
    needs: changes
    # zizmor only analyzes workflow files, so its result cannot change unless
    # they do. Path filtering applies to pull requests only; pushes, the
    # nightly schedule, and manual dispatch always run it.
    if: ${{ needs.changes.outputs.workflows == 'true' || github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0

  tests:
    name: Tests
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' || github.event_name != 'pull_request' }}
    # PRs and pushes to main run the light tier (unit, Python 3.12). The
    # nightly schedule and manual dispatch run the full tier (matrix, slow,
    # integration, demo). Release runs the full tier before publishing.
    uses: ./.github/workflows/reusable-tests.yml
    with:
      full: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  check:
    name: CI Green
    # Single aggregation gate: branch protection needs only this check. It
    # passes when every job either succeeded or was legitimately path-skipped,
    # and fails if any job failed. `always()` so it still reports when an
    # upstream job is skipped.
    if: ${{ always() }}
    needs:
      - changes
      - lint
      - docs
      - workflow-lint
      - tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Require all jobs to pass
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: lint, docs, workflow-lint, tests
